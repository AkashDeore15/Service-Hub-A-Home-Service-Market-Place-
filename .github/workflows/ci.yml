name: Auto-Generate README

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  update-readme:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This gives the bot permission to edit files

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Overwrite README.md
        run: |
          # Get the last commit message
          LAST_CHANGE=$(git log -1 --pretty=format:"%s")
          
          cat > README.md << HEREDOC
          # 🏠 Service Hub — Marketplace

          ## 📢 Latest Update
          > **Last Change:** ${LAST_CHANGE}
          > **Updated On:** $(date)

          ---

          ## 🚀 Quick Start
          \`\`\`bash
          npm run setup
          npm run dev
          \`\`\`

          ---
          *Last updated via GitHub Actions [skip ci]*
          HEREDOC

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only push if something actually changed
          git diff --staged --quiet || (git commit -m "docs: auto-update readme [skip ci]" && git push)